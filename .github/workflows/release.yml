name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          # Verify tag matches Cargo.toml version
          cargo_version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          if [ "$version" != "$cargo_version" ]; then
            echo "::error::Tag version ($version) does not match Cargo.toml version ($cargo_version)"
            exit 1
          fi
      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --draft --title "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross
      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --locked --release --target ${{ matrix.target }}
          else
            cargo build --locked --release --target ${{ matrix.target }}
          fi
      - name: Strip binary
        if: "!matrix.cross && runner.os != 'Windows'"
        run: strip "target/${{ matrix.target }}/release/nablex"
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          version="${{ needs.create-release.outputs.version }}"
          staging="nablex-${version}-${{ matrix.target }}"
          archive="${staging}.tar.gz"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/nablex" "$staging/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$staging/"
          tar czf "$archive" "$staging"
          shasum -a 256 "$archive" > "$archive.sha256"
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          version="${{ needs.create-release.outputs.version }}"
          staging="nablex-${version}-${{ matrix.target }}"
          archive="${staging}.zip"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/nablex.exe" "$staging/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$staging/"
          7z a "$archive" "$staging"
          certutil -hashfile "$archive" SHA256 | head -2 | tail -1 | \
            awk -v f="$archive" '{print $1 "  " f}' > "$archive.sha256"
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"
      - name: Upload release assets
        shell: bash
        run: gh release upload "${{ github.ref_name }}" "${{ env.ARCHIVE }}" "${{ env.ARCHIVE }}.sha256"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
